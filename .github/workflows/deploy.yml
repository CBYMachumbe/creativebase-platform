name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: []
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci && npm run build
      - name: Deploy API to staging
        run: echo "Deploy step — configure with your cloud provider (ECS/App Runner/Railway)"
      - name: Deploy Web to staging
        run: echo "Deploy step — configure with your cloud provider (Vercel/ECS)"
      - name: Run DB migrations on staging
        run: echo "npx prisma migrate deploy — runs against staging DB"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci && npm run build
      - name: Deploy to production
        run: echo "Deploy step — configure with your cloud provider"
