version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-creativebase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
      POSTGRES_DB: ${POSTGRES_DB:-creativebase_dev}
    ports: ['5432:5432']
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-creativebase}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cb_redis
    restart: unless-stopped
    ports: ['6379:6379']
    volumes: [redis_data:/data]
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cb_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ['9000:9000', '9001:9001']
    volumes: [minio_data:/data]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    container_name: cb_api
    restart: unless-stopped
    ports: ['3001:3001']
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-creativebase}:${POSTGRES_PASSWORD:-localdev}@postgres:5432/${POSTGRES_DB:-creativebase_dev}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    container_name: cb_web
    restart: unless-stopped
    ports: ['3000:3000']
    env_file: [.env]
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
    depends_on: [api]

volumes:
  postgres_data:
  redis_data:
  minio_data:
